user_prompt: |
  You are a traffic-scene safety analyzer for autonomous navigation.
  Analyze the provided overhead traffic-camera video.

  IMPORTANT OUTPUT RULES:
  - Output STRICT JSON only. No markdown. No extra text.
  - Do NOT include step-by-step reasoning. If you need to justify something, use short 'evidence' strings.
  - If unsure, set lower confidence and explain briefly in 'evidence'.

  TASK:
  1) Identify all objects relevant to safe navigation (vehicles, pedestrians, cyclists, animals, debris, stalled vehicles, emergency vehicles, cones/barriers, unusual motion).
  2) Track each object over time (coarse). Use relative image coordinates:
     - positions normalized: x,y in [0,1] where (0,0)=top-left of frame.
     - bbox normalized: [x_min,y_min,x_max,y_max] if you can estimate; else null.
  3) Detect hazards and near-term risks (collision paths, wrong-way, sudden stop, occlusion, debris in lane, red-light running, blocked lane, queue spillback).
  4) Recommend a safe driving action for an ego vehicle that is approaching the scene (slowdown/stop/yield/lane change/keep distance), with a confidence.

  JSON SCHEMA:
  {
    "scene": {
      "camera_view": "overhead_traffic_camera",
      "time_window_s": number,
      "road_layout": {
        "lanes": number|null,
        "directions": ["N","S","E","W"]|null,
        "intersections": boolean|null,
        "notes": string
      },
      "lighting_weather": {"day_night": string, "visibility": string, "notes": string}
    },
    "objects": [
      {
        "id": "obj_1",
        "type": "vehicle|pedestrian|cyclist|animal|debris|barrier|traffic_cone|emergency_vehicle|unknown",
        "subtype": string|null,
        "navigation_critical": boolean,
        "confidence": number,
        "states": [
          {
            "t_s": number,
            "position": {"x": number, "y": number},
            "bbox": [number,number,number,number]|null,
            "motion": {"speed": "stopped|slow|medium|fast|unknown", "direction": "N|S|E|W|NE|NW|SE|SW|unknown"}
          }
        ],
        "evidence": [string]
      }
    ],
    "hazards": [
      {
        "id": "hz_1",
        "type": "debris|stalled_vehicle|near_collision|wrong_way|blocked_lane|sudden_stop|pedestrian_in_road|occlusion|unknown",
        "severity": "low|medium|high",
        "time_range_s": [number, number],
        "location": {"x": number, "y": number},
        "related_object_ids": [string],
        "evidence": [string]
      }
    ],
    "recommended_ego_behavior": {
      "primary_action": "maintain_speed|slow_down|prepare_to_stop|stop|yield|change_lane_left|change_lane_right|reroute|unknown",
      "target_speed_reduction": "none|light|moderate|strong|unknown",
      "follow_distance": "normal|increase|max",
      "confidence": number,
      "rationale": [string]
    }
  }

  If the video is unreadable or missing, output JSON with empty arrays and explain in scene.notes.